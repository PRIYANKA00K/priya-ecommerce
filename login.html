<!DOCTYPE html>
<html>
<head>
<title>Priya E-Commerce</title>
<link rel="stylesheet" href="/css/style.css"></link>
<style>
body { font-family: Arial; text-align: center; }
button { padding: 10px; margin: 10px; }
</style>
</head>
<body>

<div class="login-box">
  <h2>Priya E-Commerce</h2>

  <input type="email" id="email" placeholder="Enter Email">
  <button class="btn" onclick="sendOTP()">Send OTP</button>

  <input type="text" id="otp" placeholder="Enter OTP">
  <button class="btn btn-success" onclick="verifyOTP()">Verify OTP</button>

  <hr>

  <a href="/auth/google">
    <button class="btn">Login with Google</button>
  </a>
</div>

<script>
async function sendOTP(){
  const email = document.getElementById("email").value;
  await fetch("/send-email-otp",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email})
  });
  alert("OTP Sent");
}

async function verifyOTP(){
  const email = document.getElementById("email").value;
  const otp = document.getElementById("otp").value;

  const res = await fetch("/verify-email-otp",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email,otp})
  });

  if(res.ok) window.location.href="/home.html";
  else alert("Invalid OTP");
}
</script>

</body>
</html>
