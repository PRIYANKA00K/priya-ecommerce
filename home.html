<!DOCTYPE html>
<html>
<head>
  <title>Priya E-Commerce</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="navbar">
  <h2>Priya E-Commerce</h2>
  <div class="nav-right">
    <input type="text" id="searchInput" placeholder="Search products..." oninput="searchProducts()">
    <a href="/cart.html">Cart</a>
    <a href="/logout">Logout</a>
  </div>
</div>

<div class="container">
  <h1>🔥 Big Sale Today!</h1>
  <p>Up to 50% OFF on selected products</p>

  <div class="categories">
    <div class="category" onclick="filterCategory('Fashion')"><img src="/images/fashion.png"><span>Fashion</span></div>
    <div class="category" onclick="filterCategory('Electronics')"><img src="/images/electronics.png"><span>Electronics</span></div>
    <div class="category" onclick="filterCategory('Travel')"><img src="/images/travel.png"><span>Travel</span></div>
    <div class="category" onclick="filterCategory('Home & Kitchen')"><img src="/images/home.png"><span>Home & Kitchen</span></div>
    <div class="category" onclick="filterCategory('Auto')"><img src="/images/auto.png"><span>Auto</span></div>
    <div class="category" onclick="filterCategory('Toys & Baby')"><img src="/images/toys.png"><span>Toys & Baby</span></div>
    <div class="category" onclick="filterCategory('Genz Trends')"><img src="/images/genz.png"><span>Genz Trends</span></div>
    <div class="category" onclick="filterCategory('Mobiles & Appliances')"><img src="/images/mobiles.png"><span>Mobiles & Appliances</span></div>
  </div>

  <div class="products" id="productList"></div>
</div>

<div class="footer">
  © 2026 Priya E-Commerce
</div>

<script src="/js/script.js"></script>
<script>
async function loadProducts(){
  const res = await fetch("/products");
  const products = await res.json();
  displayProducts(products);
}

function displayProducts(products){
  const container = document.getElementById("productList");
  container.innerHTML = "";
  products.forEach(p => {
    let priceHTML = p.isOnSale ? 
      `<span class="old-price">₹${p.price}</span>
       <span class="price">₹${p.price - (p.price*p.discountPercent/100)}</span>` :
      `<span class="price">₹${p.price}</span>`;

    container.innerHTML += `
      <div class="card">
        ${p.isOnSale ? `<div class="badge">${p.discountPercent}% OFF</div>` : ""}
        <img src="${p.image || '/images/default.png'}" alt="${p.name}" style="width:100%; border-radius:8px;">
        <h3>${p.name}</h3>
        <p>${p.description}</p>
        ${priceHTML}
        <button class="btn" onclick="addToCart('${p._id}')">Add to Cart</button>
      </div>
    `;
  });
}

function searchProducts(){
  const input = document.getElementById("searchInput").value.toLowerCase();
  const cards = document.querySelectorAll(".products .card");
  cards.forEach(card => {
    const name = card.querySelector("h3").innerText.toLowerCase();
    card.style.display = name.includes(input) ? "block" : "none";
  });
}

async function filterCategory(category){
  const res = await fetch(`/products`);
  const products = await res.json();
  displayProducts(products.filter(p => p.category === category));
}

loadProducts();
</script>
</body>
</html>
